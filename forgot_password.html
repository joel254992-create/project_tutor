<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - TutorLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="forgot_password.css">
</head>
<body>
<div class="mobile-container">
    <div class="header-orange">
        <a href="login.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <i class="fa-solid fa-lock" style="font-size:40px; margin-bottom:8px;"></i>
        <div class="header-title">ลืมรหัสผ่าน</div>
    </div>
    <div class="content">
        <div class="info-box">
            <i class="fa-solid fa-circle-info" style="color:#FF6B6B; margin-right:5px;"></i>
            กรุณากรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้ทางอีเมลของคุณ
        </div>
        <div class="success-msg" id="successMsg">
            <i class="fa-solid fa-circle-check"></i> ส่งลิงก์ตั้งรหัสผ่านใหม่ไปยังอีเมลของคุณแล้ว<br>กำลังกลับไปหน้าเข้าสู่ระบบ...
        </div>
        <form id="resetForm">
            <label class="input-label">อีเมล</label>
            <input type="email" id="email" class="input-field" placeholder="กรอกอีเมลของคุณ" required>
            <button type="submit" class="btn-submit">ส่งลิงก์ตั้งรหัสผ่านใหม่</button>
        </form>
        <a href="login.html" class="back-link">กลับไปหน้าเข้าสู่ระบบ</a>
    </div>
</div>
<script src="forgot_password.java"></script>
</body>
</html>
