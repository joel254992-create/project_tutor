<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - TutorLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="mobile-container">
    <div class="header-orange"><div class="header-title">เข้าสู่ระบบ</div></div>
    <div class="content">
        <div class="success-msg" id="successMsg"><i class="fa-solid fa-circle-check"></i> สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ</div>
        <div class="logout-msg" id="logoutMsg"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบสำเร็จ</div>
        <form class="login-form" id="loginForm">
            <div class="input-group"><label class="input-label">อีเมล</label><input type="email" id="email" class="input-field" placeholder="กรอกอีเมลของคุณ" required></div>
            <div class="input-group"><label class="input-label">รหัสผ่าน</label><input type="password" id="password" class="input-field" placeholder="........" required></div>
            <a href="forgot_password.html" class="forgot-link">ลืมรหัสผ่าน?</a>
            <div id="error-msg">อีเมลหรือรหัสผ่านไม่ถูกต้อง!</div>
            <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
            <div class="register-text">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></div>
        </form>
        <div class="demo-box">
            <h4><i class="fa-solid fa-key"></i> บัญชีทดสอบ (Demo)</h4>
            <div class="demo-row">นักศึกษา: <span>user@gmail.com / 1234</span></div>
            <div class="demo-row">ติวเตอร์: <span>tutor@gmail.com / 5678</span></div>
            <div class="demo-row">แอดมิน: <span>admin@gmail.com / 4321</span></div>
        </div>
    </div>
</div>
<script src="login.java"></script>
</body>
</html>
